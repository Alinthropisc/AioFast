name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "core/**"
      - "mkdocs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: "📚 Build Docs"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install ".[dev,docs]" mkdocs-material "mkdocstrings[python]" mkdocs-gen-files mkdocs-literate-nav mkdocs-section-index

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: site/

  deploy:
    name: "🚀 Deploy Docs"
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install ".[dev,docs]" mkdocs-material "mkdocstrings[python]"

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-docs:
    name: "📖 Generate API Reference"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          uv pip install ".[dev]" pdoc3

      - name: Generate API docs
        run: uv run pdoc --html --output-dir api-docs core

      - name: Upload API docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: api-docs/