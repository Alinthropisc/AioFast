name: Stale

on:
  schedule:
    - cron: "0 0 * * *"  # Daily midnight

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: "🧹 Stale Issues & PRs"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          stale-issue-message: >
            👋 This issue has been automatically marked as stale because it
            has not had any activity for 30 days. It will be closed in 7 days
            if no further activity occurs. If this issue is still relevant,
            please leave a comment or remove the `stale` label.
          close-issue-message: >
            🔒 This issue was closed because it has been stale for 37 days
            with no activity. Feel free to reopen if this is still relevant.
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          exempt-issue-labels: "pinned,security,bug,enhancement"

          # PRs
          stale-pr-message: >
            👋 This PR has been automatically marked as stale because it
            has not had any activity for 14 days. It will be closed in 7 days
            if no further activity occurs.
          close-pr-message: >
            🔒 This PR was closed because it has been stale for 21 days.
            Feel free to reopen when ready.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: "stale"
          exempt-pr-labels: "WIP,do-not-close"