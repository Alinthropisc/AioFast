name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  full-matrix:
    name: "🌙 Py${{ matrix.python }} / ${{ matrix.os }} / ${{ matrix.db }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        db: [sqlite]
        include:
          - python: "3.10"
            os: ubuntu-latest
            db: postgresql
          - python: "3.11"
            os: ubuntu-latest
            db: postgresql
          - python: "3.12"
            os: ubuntu-latest
            db: postgresql
          - python: "3.13"
            os: ubuntu-latest
            db: postgresql
          - python: "3.12"
            os: ubuntu-latest
            db: mysql

    services:
      postgres:
        image: ${{ matrix.db == 'postgresql' && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: aiofast
          POSTGRES_PASSWORD: aiofast_test
          POSTGRES_DB: aiofast_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      mysql:
        image: ${{ matrix.db == 'mysql' && 'mysql:8.0' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: aiofast_test
          MYSQL_DATABASE: aiofast_test
          MYSQL_USER: aiofast
          MYSQL_PASSWORD: aiofast_test
        ports: ["3306:3306"]
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: >-
        ${{ matrix.db == 'postgresql'
          && 'postgresql+asyncpg://aiofast:aiofast_test@localhost:5432/aiofast_test'
          || matrix.db == 'mysql'
          && 'mysql+aiomysql://aiofast:aiofast_test@localhost:3306/aiofast_test'
          || 'sqlite+aiosqlite:///:memory:' }}
      UV_SYSTEM_PYTHON: 1

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          uv pip install ".[dev,test]"
          uv pip install aiosqlite
          ${{ matrix.db == 'postgresql' && 'uv pip install asyncpg' || '' }}
          ${{ matrix.db == 'mysql' && 'uv pip install aiomysql' || '' }}

      - name: Test
        run: uv run pytest tests/ -v --tb=short --timeout=120

  report-failure:
    name: "📋 Report Failures"
    runs-on: ubuntu-latest
    needs: [full-matrix]
    if: failure()

    steps:
      - uses: actions/checkout@v4

      - name: Create issue on failure
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: .github/NIGHTLY_FAILURE_TEMPLATE.md
          update_existing: true
          search_existing: open