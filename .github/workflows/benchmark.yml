name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: "⚡ Performance Benchmark"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv pip install --system ".[dev,test]" aiosqlite pytest-benchmark

      - name: Run benchmarks
        run: |
          pytest benchmarks/ \
            --benchmark-json=benchmark-results.json \
            --benchmark-sort=mean \
            --benchmark-min-rounds=10 \
            -v || true

      - name: Store benchmark result
        if: github.ref == 'refs/heads/main' && hashFiles('benchmark-results.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: "dev/benchmarks"
  
      - name: Compare with main (PR only)
        if: github.event_name == 'pull_request' && hashFiles('benchmark-results.json') != ''
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-always: true
          alert-threshold: "130%"
          fail-on-alert: true