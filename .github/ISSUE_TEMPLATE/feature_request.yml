name: 🚀 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why do you need this?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: Show how the API would look
      render: python

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Database / ORM
        - Authentication / Authorization
        - Container / DI
        - HTTP / Routing
        - Events
        - Configuration
        - Testing
        - CLI
        - Documentation
        - Other

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature