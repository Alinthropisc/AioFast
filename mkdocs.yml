site_name: AioFast
site_description: The async-first Python framework — Litestar + Aiogram, Laravel-style DX.
repo_url: https://github.com/Alinthropisc/AioFast
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - CLI (aiocraft): cli.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
