name: aiofast

services:
  # ── pgAdmin ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aiofast-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aiofast.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - aiofast-network

  # ── RedisInsight ─────────────────────────────────────────
  redisinsight:
    image: redis/redisinsight:latest
    container_name: aiofast-redisinsight
    restart: unless-stopped
    ports:
      - "${REDISINSIGHT_PORT:-5540}:5540"
    depends_on:
      - redis
    networks:
      - aiofast-network

  # ── MailHog (SMTP testing) ───────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: aiofast-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - aiofast-network

volumes:
  pgadmin-data:
    driver: local 