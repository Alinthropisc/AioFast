name: aiofast

services:
  # ── Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aiofast-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8000}:8000"
    volumes:
      - .:/app:cached
      - app-packages:/usr/local/lib/python3.12/site-packages
    env_file: .env
    environment:
      APP_ENV: local
      SERVER_RELOAD: "true"
      SERVER_WORKERS: "1"
      DATABASE_URL: "postgresql+asyncpg://aiofast:aiofast@postgres:5432/aiofast"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiofast-network

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiofast-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: aiofast
      POSTGRES_PASSWORD: aiofast
      POSTGRES_DB: aiofast
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiofast"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - aiofast-network

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aiofast-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aiofast-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-packages:
    driver: local

networks:
  aiofast-network:
    driver: bridge